# ------------------------------------------------------------
#  ALLGEMEINE EINSTELLUNGEN
# ------------------------------------------------------------
settings:

  max-level: 5
  drop-on-death: true
  prevent-stacking: true
  allow-admin-free-upgrade: true
  debug: false



# ------------------------------------------------------------
#  NACHRICHTEN
# ------------------------------------------------------------
messages:

  prefix: "§6BierOfen §8• §7"

  no-permission: "§cDazu hast du keine Berechtigung."
  not-a-furnace: "§cDas ist kein BierOfen."
  not-enough-money: "§cDu hast nicht genug Geld."
  max-level: "§eDieser Ofen ist bereits auf dem Max-Level."

  upgrade-success: "§aDein Ofen wurde auf Level §e%level% §aupgegradet!"
  admin-upgrade-success: "§aDer Ofen wurde kostenlos auf Level §e%level% §agesetzt."

  furnace-placed: "§aBierOfen platziert! Level: §e%level%"
  furnace-broken: "§cBierOfen abgebaut. Level gespeichert."

  wiki-opened: "§aBierOfen-Wiki geöffnet."



# ------------------------------------------------------------
#  GUI EINSTELLUNGEN
# ------------------------------------------------------------
gui:

  upgrade:
    title: "§6BierOfen §8• §eUpgrade"

  admin:
    title: "§6BierOfen §8• §cAdmin"

  wiki:
    title: "§6BierOfen §8• §bWiki"



# ------------------------------------------------------------
#  LEVEL-KONFIGURATION
# ------------------------------------------------------------
levels:

  # ----------------------------------------------------------
  #  KOSTEN PRO LEVEL
  # ----------------------------------------------------------
  cost:
    1: 100
    2: 250
    3: 500
    4: 1000
    5: 2000

  # ----------------------------------------------------------
  #  SPEED-BONUS
  #
  #  Bedeutet:
  #    Wie viel schneller der Ofen brennt.
  #
  #  Beispiel:
  #    Level 1 → 0% schneller (normal)
  #    Level 2 → 5% schneller
  #    Level 3 → 10% schneller
  # ----------------------------------------------------------
  speed:
    1: 0
    2: 5
    3: 10
    4: 20
    5: 30

  # ----------------------------------------------------------
  #  DROP-BONUS
  #
  #  Bedeutet:
  #    Chance auf BONUS-Drops beim Schmelzen von Erzen.
  #
  #  WICHTIG:
  #    Wenn der Bonus triggert, gibt es NICHT nur 1 Item,
  #    sondern ZUFÄLLIG zwischen **1 und 4 Extra-Drops**.
  #
  #  Beispiel:
  #    Level 1 → 0% Chance
  #    Level 2 → 5% Chance auf +1 bis +4 Items
  #    Level 3 → 10% Chance auf +1 bis +4 Items
  #
  #  Keine Dupes:
  #    Es wird nur das Ergebnis-Item vervielfacht,
  #    niemals der Block selbst.
  # ----------------------------------------------------------
  drop:
    1: 0
    2: 5
    3: 10
    4: 15
    5: 25
